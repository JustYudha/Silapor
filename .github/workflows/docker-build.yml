name: Docker Build Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image (tanpa push AWS)
        run: docker build -f backend/Dockerfile.prod -t silapor-backend:ci .

      - name: Verify
        run: docker images silapor-backend:ci
