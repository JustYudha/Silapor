name: Docker Build (bukti container)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image (web + API port 3000)
        run: docker build -f backend/Dockerfile.prod -t silapor-backend:ci .

      - name: Build frontend image
        run: docker build --build-arg VITE_API_URL=/api -t silapor-frontend:ci ./frontend

      - name: Verify images
        run: |
          docker images | grep silapor
          echo "✅ Docker build berhasil — container siap deploy ke ECR/ECS"
